openapi: 3.1.0
info:
  title: CRE8 API
  version: 1.0.0-phase1-baseline
  description: >-
    Phase 1 baseline machine contract for CRE8 route inventory parity.
    This artifact establishes deterministic envelope and error schema references
    for initial canonical placeholder routes and is intended to stay synchronized
    with docs/30_contracts_and_interfaces/ROUTE_INVENTORY_REFERENCE.md.
servers:
  - url: https://api.cre8.local
    description: Local development placeholder server
paths:
  /v1/system/health:
    get:
      operationId: getSystemHealth
      summary: Retrieve service health status
      tags: [system]
      responses:
        '200':
          description: Service health payload wrapped in success envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                ok:
                  $ref: '#/components/examples/SuccessHealth'
        '401':
          description: Unauthorized request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalidCredential:
                  $ref: '#/components/examples/ErrorCredentialInvalid'
        '500':
          description: Internal error (redacted response).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                redacted:
                  $ref: '#/components/examples/ErrorSystemRedacted'
  /v1/authz/decide:
    post:
      operationId: postAuthorizationDecision
      summary: Evaluate authorization decision using deterministic gate order
      tags: [authorization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/policy-decision.schema.json
            examples:
              denyScope:
                $ref: '#/components/examples/AuthDecisionRequestScopeDeny'
              commentCreate:
                $ref: '#/components/examples/AuthDecisionRequestCommentCreate'
              multiAncestorLifecycle:
                $ref: '#/components/examples/AuthDecisionRequestMultiAncestorLifecycle'
      responses:
        '200':
          description: Authorization decision generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthzDecisionSuccessEnvelope'
              examples:
                allow:
                  $ref: '#/components/examples/AuthDecisionAllow'
        '400':
          description: Invalid authorization decision request payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Policy denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                explicitDeny:
                  $ref: '#/components/examples/ErrorExplicitDeny'
                permissionDenied:
                  $ref: '#/components/examples/ErrorPermissionDenied'
                scopeDenied:
                  $ref: '#/components/examples/ErrorScopeDenied'
                depthExceeded:
                  $ref: '#/components/examples/ErrorAuthDepthExceeded'
                grantExpired:
                  $ref: '#/components/examples/ErrorGrantExpired'
                multiAncestorDepthExceeded:
                  $ref: '#/components/examples/ErrorMultiAncestorDepthExceeded'
                multiAncestorGrantExpired:
                  $ref: '#/components/examples/ErrorMultiAncestorGrantExpired'
                lifecycleBlocked:
                  $ref: '#/components/examples/ErrorFeedLifecycleBlocked'
                interactionLifecycleBlocked:
                  $ref: '#/components/examples/ErrorInteractionLifecycleBlocked'
  /v1/keys/{key_id}/lifecycle/suspend:
    post:
      operationId: postKeyLifecycleSuspend
      summary: Suspend a key lifecycle state
      tags: [lifecycle]
      parameters:
        - in: path
          name: key_id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Lifecycle transition accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleSuspendSuccessEnvelope'
              examples:
                accepted:
                  $ref: '#/components/examples/LifecycleSuspendAccepted'
        '403':
          description: Policy denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                lifecycleBlocked:
                  $ref: '#/components/examples/ErrorLifecycleBlocked'
  /v1/keys/{key_id}/lifecycle/revoke:
    post:
      operationId: postKeyLifecycleRevoke
      summary: Revoke a key lifecycle state
      tags: [lifecycle]
      parameters:
        - in: path
          name: key_id
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Lifecycle transition accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LifecycleRevokeSuccessEnvelope'
              examples:
                accepted:
                  $ref: '#/components/examples/LifecycleRevokeAccepted'
        '403':
          description: Policy denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                lifecycleBlocked:
                  $ref: '#/components/examples/ErrorLifecycleBlocked'
  /v1/feed/items:
    get:
      operationId: getFeedItems
      summary: Retrieve authorized feed items in deterministic order
      tags: [feed]
      responses:
        '200':
          description: Authorized feed payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedItemsSuccessEnvelope'
              examples:
                feed:
                  $ref: '#/components/examples/FeedItemsSuccess'
        '403':
          description: Policy denied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                permissionDenied:
                  $ref: '#/components/examples/ErrorPermissionDenied'
                scopeDenied:
                  $ref: '#/components/examples/ErrorScopeDenied'
                depthExceeded:
                  $ref: '#/components/examples/ErrorAuthDepthExceeded'
                grantExpired:
                  $ref: '#/components/examples/ErrorGrantExpired'
                lifecycleBlocked:
                  $ref: '#/components/examples/ErrorFeedLifecycleBlocked'
  /v1/principals:
    post:
      summary: Create principal
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '403':

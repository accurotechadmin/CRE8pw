components:
  schemas:
    SuccessEnvelope:
      $ref: ../schemas/success-envelope.schema.json
    ErrorEnvelope:
      $ref: ../schemas/error-envelope.schema.json
    AuthzDecisionSuccessEnvelope:
      $ref: ../schemas/authz-decision-response.schema.json
    LifecycleSuspendSuccessEnvelope:
      $ref: ../schemas/lifecycle-suspend-response.schema.json
    LifecycleRevokeSuccessEnvelope:
      $ref: ../schemas/lifecycle-revoke-response.schema.json
    FeedItemsSuccessEnvelope:
      $ref: ../schemas/feed-items-response.schema.json
  securitySchemes:
    cre8Proof:
      type: http
      scheme: bearer
      bearerFormat: CRE8-Proof
  examples:
    SuccessHealth:
      value:
        data: { status: "ok" }

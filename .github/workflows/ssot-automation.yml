name: ssot-automation

on:
  pull_request:
    paths:
      - 'docs/SSOT/**'
      - 'code/**'
      - '.github/workflows/ssot-automation.yml'
  push:
    branches:
      - work
    paths:
      - 'docs/SSOT/**'
      - 'code/**'
      - '.github/workflows/ssot-automation.yml'

jobs:
  ssot-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Run SSOT lint
        run: php code/scripts/ssot/lint.php

      - name: Run SSOT sync check
        run: php code/scripts/ssot/sync_check.php

      - name: Run SSOT report
        run: php code/scripts/ssot/report.php

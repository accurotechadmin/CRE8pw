name: ssot_phase_gate

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'reports/**'
      - 'scripts/docs_ssot_*.php'
      - 'scripts/test_contract_*.php'
      - 'composer.json'
      - '.github/workflows/ssot_phase_gate.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'reports/**'
      - 'scripts/docs_ssot_*.php'
      - 'scripts/test_contract_*.php'
      - 'composer.json'
      - '.github/workflows/ssot_phase_gate.yml'

jobs:
  ssot_phase_gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Validate composer config
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run SSOT lint
        run: composer docs:ssot:lint

      - name: Run SSOT sync-check
        run: composer docs:ssot:sync-check

      - name: Run SSOT coverage report
        run: composer docs:ssot:report

      - name: Run SSOT review-gate check
        run: composer docs:ssot:review-gate-check

      - name: Run SSOT route parity check
        run: composer docs:ssot:route-parity

      - name: Run SSOT trace convention check
        run: composer docs:ssot:trace-convention-check

      - name: Run SSOT command registry audit
        run: composer docs:ssot:command-registry-audit

      - name: Run SSOT CI gate policy check
        run: composer docs:ssot:ci-gate-policy

      - name: Run SSOT PR evidence check
        run: composer docs:ssot:pr-evidence-check

      - name: Run Phase 2 acceptance bundle
        run: composer phase2:acceptance-bundle

      - name: Ordering anchor - acceptance bundle runs after SSOT checks
        run: echo 'phase2 then phase3 acceptance bundles are ordered after SSOT checks'

      - name: Run Phase 3 final acceptance bundle
        run: composer phase3:final-acceptance-bundle

      - name: Assert untraced requirements are zero
        run: |
          php -r '$f="reports/ssot/coverage_latest.json"; $j=json_decode(file_get_contents($f), true, 512, JSON_THROW_ON_ERROR); $u=(int)($j["untraced_requirements"] ?? -1); if ($u !== 0) { fwrite(STDERR, "untraced_requirements must be 0; got {$u}" . PHP_EOL); exit(1);} echo "untraced_requirements=0" . PHP_EOL;'

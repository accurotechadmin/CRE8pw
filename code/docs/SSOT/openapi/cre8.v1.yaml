openapi: 3.1.0
info:
  title: CRE8 API Contract
  version: 1.0.0-scaffold
  description: Scaffold contract implementing the first SSOT-aligned vertical slice.
servers:
  - url: /
paths:
  /health:
    get:
      summary: Deep health check
      security: []
      responses:
        '200':
          description: Health pass
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
components:
  schemas:
    SuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, checked_at_utc, latency_ms, failures, services]
          properties:
            status:
              type: string
              enum: [ok, degraded]
            checked_at_utc:
              type: string
              format: date-time
            latency_ms:
              type: integer
              minimum: 0
            failures:
              type: array
              items:
                type: string
            services:
              type: object
              required: [db, rate_limiter, key_material, http_dependency]
              properties:
                db:
                  $ref: '#/components/schemas/ServiceStatus'
                rate_limiter:
                  $ref: '#/components/schemas/ServiceStatus'
                key_material:
                  $ref: '#/components/schemas/ServiceStatus'
                http_dependency:
                  $ref: '#/components/schemas/ServiceStatus'
        meta:
          type: object
          required: [envelope_version]
          properties:
            envelope_version:
              type: string
  ServiceStatus:
    type: object
    required: [status]
    properties:
      status:
        type: string
        enum: [ok, degraded, down]

openapi: 3.1.0
info:
  title: CRE8 API Contract
  version: 1.0.0-scaffold
  description: Scaffold contract implementing SSOT-aligned status, health, and auth login slices.
servers:
  - url: /
paths:
  /:
    get:
      summary: Service status
      security: []
      responses:
        '200':
          description: Service status envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusSuccessEnvelope'
  /health:
    get:
      summary: Deep health check
      security: []
      responses:
        '200':
          description: Health pass
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessEnvelope'
  /api/auth/login:
    post:
      summary: Owner login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OwnerLoginRequest'
      responses:
        '200':
          description: Login token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /api/auth/key-login:
    post:
      summary: Key login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KeyLoginRequest'
      responses:
        '200':
          description: Key token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessEnvelope'
        '401':
          description: Invalid key credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:
  schemas:
    Meta:
      type: object
      required: [envelope_version]
      properties:
        envelope_version:
          type: string
    OwnerLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    KeyLoginRequest:
      type: object
      required: [key_id, api_key]
      properties:
        key_id:
          type: string
          minLength: 1
        api_key:
          type: string
          minLength: 1
    StatusSuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [service, status]
          properties:
            service:
              type: string
              const: cre8
            status:
              type: string
              const: ok
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              required: [timestamp_utc]
              properties:
                timestamp_utc:
                  type: string
                  format: date-time
    HealthSuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, checked_at_utc, latency_ms, failures, services]
          properties:
            status:
              type: string
              enum: [ok, degraded]
            checked_at_utc:
              type: string
              format: date-time
            latency_ms:
              type: integer
              minimum: 0
            failures:
              type: array
              items:
                type: string
            services:
              type: object
              required: [db, rate_limiter, key_material, http_dependency]
              properties:
                db: { $ref: '#/components/schemas/ServiceStatus' }
                rate_limiter: { $ref: '#/components/schemas/ServiceStatus' }
                key_material: { $ref: '#/components/schemas/ServiceStatus' }
                http_dependency: { $ref: '#/components/schemas/ServiceStatus' }
        meta:
          $ref: '#/components/schemas/Meta'
    LoginSuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [access_token, refresh_token, expires_in]
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            expires_in:
              type: integer
              minimum: 1
        meta:
          $ref: '#/components/schemas/Meta'
    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message, details, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: object
              additionalProperties: true
            request_id: { type: string }
        meta:
          $ref: '#/components/schemas/Meta'
    ServiceStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, down]

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRE8 Console UI</title>
    <link rel="stylesheet" href="/ui/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>CRE8 Integration Console</h1>
      <div class="session-row">
        <span id="session-chip" class="chip">No active session</span>
        <button id="clear-session" type="button">Clear session</button>
      </div>
      <nav id="main-nav" class="nav-links" aria-label="Primary navigation"></nav>
    </header>

    <main class="app-main" id="main-content">
      <section id="flash-region" aria-live="polite" aria-atomic="true" tabindex="-1"></section>
      <section id="view-root" tabindex="-1"></section>
      <section id="response-inspector" class="inspector" aria-live="polite"></section>
    </main>

    <script type="module" src="/ui/app.js"></script>
  </body>
</html>

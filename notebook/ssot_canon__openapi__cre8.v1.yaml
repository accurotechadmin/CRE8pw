openapi: 3.1.0
info:
  title: CRE8 API Contract
  version: 1.0.0
  description: Canonical API contract for CRE8 public/auth/gateway/console surfaces.
servers:
  - url: /
security:
  - bearerAuth: []
paths:
  /:
    get:
      summary: Service banner
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /health:
    get:
      summary: Deep health check
      security: []
      responses:
        '200':
          description: Health pass
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
  /.well-known/jwks.json:
    get:
      summary: JWKS document
      security: []
      responses:
        '200':
          description: JWKS
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
  /ui/{route}:
    get:
      summary: UI shell or static asset fallback
      security: []
      parameters:
        - in: path
          name: route
          required: true
          schema: { type: string }
      responses:
        '200': { description: UI content }
  /console/owners:
    post:
      summary: Owner registration
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OwnerSignupRequest' }
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '409': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /api/auth/login:
    post:
      summary: Owner login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OwnerLoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /api/auth/key-login:
    post:
      summary: Key login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KeyLoginRequest' }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /api/auth/refresh:
    post:
      summary: Token refresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Error' }
  /api/feed:
    get:
      summary: Feed list
      parameters:
        - in: query
          name: scope
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
  /api/posts:
    post:
      summary: Create post
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '401': { $ref: '#/components/responses/Error' }
        '403': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /api/posts/{postId}:
    get:
      summary: Get post detail
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/Error' }
    patch:
      summary: Edit post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '403': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /api/posts/{postId}/flags:
    post:
      summary: Flag post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '422': { $ref: '#/components/responses/Error' }
  /api/posts/{postId}/comments:
    get:
      summary: List comments
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      summary: Create comment
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '403': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /console/api/posts:
    get:
      summary: List console posts
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      summary: Create console post
      responses:
        '201': { $ref: '#/components/responses/Success' }
  /console/api/keychains:
    get:
      summary: List keychains
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      summary: Create keychain
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '422': { $ref: '#/components/responses/Error' }
  /console/api/keychains/{keychainId}/members:
    get:
      summary: List keychain members
      parameters:
        - $ref: '#/components/parameters/KeychainId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
    post:
      summary: Add keychain member
      parameters:
        - $ref: '#/components/parameters/KeychainId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KeychainMemberAddRequest' }
      responses:
        '201': { $ref: '#/components/responses/Success' }
        '409': { $ref: '#/components/responses/Error' }
        '422': { $ref: '#/components/responses/Error' }
  /console/api/keychains/{keychainId}/members/{memberKeyId}:
    delete:
      summary: Remove keychain member
      parameters:
        - $ref: '#/components/parameters/KeychainId'
        - $ref: '#/components/parameters/MemberKeyId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/Error' }
  /console/api/keychains/{keychainId}/resolve:
    get:
      summary: Resolve effective keychain permissions and scope
      parameters:
        - $ref: '#/components/parameters/KeychainId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
        '404': { $ref: '#/components/responses/Error' }
  /console/api/invites:
    post:
      summary: Create invite
      responses:
        '201': { $ref: '#/components/responses/Success' }
  /console/api/keys:
    post:
      summary: Issue key
      responses:
        '201': { $ref: '#/components/responses/Success' }
  /console/api/keys/{keyId}/lifecycle:
    post:
      summary: Key lifecycle transition
      parameters:
        - $ref: '#/components/parameters/KeyId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
  /console/api/posts/{postId}/moderation:
    post:
      summary: Moderate post
      parameters:
        - $ref: '#/components/parameters/PostId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
  /console/api/posts/{postId}/comments/{commentId}/moderation:
    post:
      summary: Moderate comment
      parameters:
        - $ref: '#/components/parameters/PostId'
        - $ref: '#/components/parameters/CommentId'
      responses:
        '200': { $ref: '#/components/responses/Success' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    PostId:
      in: path
      name: postId
      required: true
      schema: { type: string }
    KeyId:
      in: path
      name: keyId
      required: true
      schema: { type: string }
    CommentId:
      in: path
      name: commentId
      required: true
      schema: { type: string }
    KeychainId:
      in: path
      name: keychainId
      required: true
      schema: { type: string }
    MemberKeyId:
      in: path
      name: memberKeyId
      required: true
      schema: { type: string }
  responses:
    Success:
      description: Successful envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/SuccessEnvelope' }
    Error:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
  schemas:
    Meta:
      type: object
      required: [envelope_version]
      additionalProperties: true
      properties:
        envelope_version: { type: string }
        timestamp_utc: { type: string, format: date-time }
    SuccessEnvelope:
      type: object
      required: [data, meta]
      properties:
        data: {}
        meta: { $ref: '#/components/schemas/Meta' }
    ErrorEnvelope:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
            request_id: { type: string }
        meta: { $ref: '#/components/schemas/Meta' }
    OwnerSignupRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
    OwnerLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    KeyLoginRequest:
      type: object
      required: [key_id, api_key]
      properties:
        key_id: { type: string, minLength: 1 }
        api_key: { type: string, minLength: 1 }
    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
    KeychainMemberAddRequest:
      type: object
      required: [member_key_id]
      properties:
        member_key_id: { type: string }
        role_hint: { type: string }
